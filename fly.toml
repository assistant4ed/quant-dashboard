app = 'protrader-hk'
primary_region = 'hkg'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[env]
  PYTHON_BIN = '/usr/local/bin/python'
  PORT = '8080'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
